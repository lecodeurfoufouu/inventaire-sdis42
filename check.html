/* ══════════════════════════════════
   ÉTAT
══════════════════════════════════ */
const STORAGE_KEY = 'sdis42_checks';
let currentPageIdx = 0;
let checks = loadChecks();

function loadChecks() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch(e) { return {}; }
}
function saveChecks() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(checks)); }
  catch(e) {}
}

/* Couleurs hex */
const COLORS = {
  'c-rouge':'#CC2020','c-orange':'#D97820','c-vert':'#2A7B35',
  'c-bleu':'#1458A8','c-jaune':'#E8A000','c-gris':'#3C3C3C'
};

/* ══════════════════════════════════
   CONSTRUCTION DE L'INTERFACE
══════════════════════════════════ */
function init() {
  buildTabs();
  renderPage(currentPageIdx);
}

function buildTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  defaultPages.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = p.nom;
    btn.onclick = () => switchTab(i);
    tabs.appendChild(btn);
  });
}

function switchTab(idx) {
  currentPageIdx = idx;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i === idx));
  renderPage(idx);
}

function renderPage(idx) {
  const page = defaultPages[idx];
  const pid  = 'p' + idx;
  if (!checks[pid]) checks[pid] = {};
  const content = document.getElementById('content');
  content.innerHTML = '';

  if (!page.cellules || page.cellules.length === 0) {
    content.innerHTML = '<div class="empty-state"><div class="es-icon">📦</div><p>Aucun article dans cet inventaire.</p></div>';
    updateProgress(idx);
    return;
  }

  page.cellules.forEach((cel, ci) => {
    if (!cel.items || cel.items.length === 0) return;
    const card = document.createElement('div');
    const allChecked = cel.items.every((_, ii) => checks[pid][cel.id+'_'+ii]);
    card.className = 'section-card' + (allChecked ? ' done' : '');
    card.dataset.ci = ci;

    const color = COLORS[cel.couleur] || '#CC2020';
    const doneCount = cel.items.filter((_, ii) => checks[pid][cel.id+'_'+ii]).length;

    card.innerHTML = `
      <div class="section-header" style="background:${color}" onclick="toggleSection(this)">
        <div class="section-left">
          <div class="section-icon"></div>
          <div class="section-title">${cel.titre}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="section-pill ${allChecked?'done':''}">${doneCount}/${cel.items.length}</span>
          <span class="chevron">▾</span>
        </div>
      </div>
      <div class="items"></div>`;

    const itemsDiv = card.querySelector('.items');
    cel.items.forEach((item, ii) => {
      const key = cel.id + '_' + ii;
      const isChk = !!checks[pid][key];
      const row = document.createElement('div');
      row.className = 'item' + (isChk ? ' checked' : '');
      row.innerHTML = `
        <div class="check-box">${isChk ? '✓' : ''}</div>
        <div class="item-name">${item.n}</div>
        ${item.q ? `<div class="item-qty">×${item.q}</div>` : ''}`;
      row.onclick = () => toggleItem(idx, cel, ii);
      itemsDiv.appendChild(row);
    });

    content.appendChild(card);
  });

  updateProgress(idx);
}

function toggleSection(header) {
  header.closest('.section-card').classList.toggle('collapsed');
}

function toggleItem(pageIdx, cel, itemIdx) {
  const pid = 'p' + pageIdx;
  const key = cel.id + '_' + itemIdx;
  checks[pid][key] = !checks[pid][key];
  saveChecks();
  renderPage(pageIdx);
}

function updateProgress(idx) {
  const page = defaultPages[idx];
  const pid  = 'p' + idx;
  let total = 0, done = 0;
  (page.cellules || []).forEach(cel => {
    (cel.items || []).forEach((_, ii) => {
      total++;
      if (checks[pid] && checks[pid][cel.id+'_'+ii]) done++;
    });
  });
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${done} / ${total} articles`;
  document.getElementById('prog-pct').textContent  = pct + '%';
}

/* ══════════════════════════════════
   RESET
══════════════════════════════════ */
function resetCurrent() {
  if (!confirm('Réinitialiser tous les articles de cet engin ?')) return;
  checks['p' + currentPageIdx] = {};
  saveChecks();
  renderPage(currentPageIdx);
}

/* ══════════════════════════════════
   VALIDATION
══════════════════════════════════ */
function validate() {
  const page = defaultPages[currentPageIdx];
  const pid  = 'p' + currentPageIdx;
  let total = 0, done = 0;
  const missing = [];

  (page.cellules || []).forEach(cel => {
    (cel.items || []).forEach((item, ii) => {
      total++;
      if (checks[pid] && checks[pid][cel.id+'_'+ii]) { done++; }
      else { missing.push({ section: cel.titre, name: item.n, qty: item.q }); }
    });
  });

  const now = new Date();
  const time = now.toLocaleString('fr-FR', { weekday:'long', day:'numeric', month:'long', hour:'2-digit', minute:'2-digit' });

  document.getElementById('r-icon').textContent    = missing.length === 0 ? '✅' : '⚠️';
  document.getElementById('r-title').textContent   = missing.length === 0 ? 'Inventaire complet !' : `${missing.length} manquant(s)`;
  document.getElementById('r-title').className     = 'result-title ' + (missing.length === 0 ? 'ok' : 'ko');
  document.getElementById('r-sub').textContent     = `${done}/${total} articles vérifiés — ${page.nom}`;
  document.getElementById('r-time').textContent    = time;

  const missList = document.getElementById('r-missing');
  if (missing.length > 0) {
    // Grouper par section
    const bySec = {};
    missing.forEach(m => { if (!bySec[m.section]) bySec[m.section]=[]; bySec[m.section].push(m); });
    missList.innerHTML = Object.entries(bySec).map(([sec, items]) =>
      `<div class="miss-section">${sec}</div>` +
      items.map(i => `<div class="miss-item">• ${i.name}${i.qty?' ×'+i.qty:''}</div>`).join('')
    ).join('');
    missList.style.display = 'block';
  } else {
    missList.style.display = 'none';
  }

  document.getElementById('result-modal').classList.add('open');
}

function closeResult(e) {
  if (!e || e.target === document.getElementById('result-modal') || e.currentTarget === document.querySelector('.btn-close-result')) {
    document.getElementById('result-modal').classList.remove('open');
  }
}

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
init();

// Ouvre le bon engin si URL contient un hash (depuis QR code de l'affiche)
const _hash = decodeURIComponent(window.location.hash.replace('#',''));
if (_hash) {
  const idx = defaultPages.findIndex(p => p.nom === _hash);
  if (idx >= 0) switchTab(idx);
}
</script>
